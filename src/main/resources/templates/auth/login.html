<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>登录 - File Hub</title>
    <link rel="stylesheet" th:href="@{/auth.css}">
</head>
<body>
<div class="auth-container">
    <div class="auth-card">
        <h1>File Hub</h1>
        <p class="subtitle">文件任务管理平台</p>

        <p class="flash error" th:if="${param.error}" th:text="'用户名或密码错误'"></p>
        <p class="flash success" th:if="${param.logout}" th:text="'您已成功登出'"></p>
        <p class="flash" th:if="${message}" th:text="${message}"></p>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" name="username" required autofocus placeholder="请输入用户名">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" name="password" required placeholder="请输入密码">
            </div>
            <button type="submit" class="btn-primary">登录</button>
        </form>

        <div class="auth-links">
            <a th:href="@{/register}">没有账号？立即注册</a>
        </div>
    </div>
</div>
</body>
</html>
