<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>注册 - File Hub</title>
    <link rel="stylesheet" th:href="@{/auth.css}">
</head>
<body>
<div class="auth-container">
    <div class="auth-card">
        <h1>注册新用户</h1>
        <p class="subtitle">创建您的 File Hub 账号</p>

        <p class="flash error" th:if="${error}" th:text="${error}"></p>

        <form th:action="@{/register}" method="post" th:object="${registerForm}">
            <div class="form-group">
                <label>用户名 <span class="required">*</span></label>
                <input type="text" name="username" th:value="*{username}" required
                       placeholder="3-50字符，字母数字下划线">
            </div>
            <div class="form-group">
                <label>密码 <span class="required">*</span></label>
                <input type="password" name="password" required placeholder="6-100字符">
            </div>
            <div class="form-group">
                <label>确认密码 <span class="required">*</span></label>
                <input type="password" name="confirmPassword" required placeholder="请再次输入密码">
            </div>
            <div class="form-group">
                <label>昵称</label>
                <input type="text" name="nickname" th:value="*{nickname}" placeholder="可选">
            </div>
            <button type="submit" class="btn-primary">注册</button>
        </form>

        <div class="auth-links">
            <a th:href="@{/login}">已有账号？立即登录</a>
        </div>
    </div>
</div>
</body>
</html>
