spring:
  datasource:
    url: jdbc:mysql://localhost:3306/file_hub?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: filehub
    password: filehub
    driver-class-name: com.mysql.cj.jdbc.Driver

jasypt:
  encryptor:
    password: change-this-password

filehub:
  scheduler:
    pool-size: 10
  storage:
    local-download-dir: ./var/downloads
    local-upload-dir: ./var/uploads
  crypto:
    decrypt-type: jasypt
    aes-key: changeit-changeit
  oss:
    enabled: false
    endpoint: http://localhost
    access-key-id: demo
    access-key-secret: demo
    bucket-name: demo
    folder-name: uploads
    address: http://localhost/files/
